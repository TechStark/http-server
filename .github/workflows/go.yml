name: Go
on:
  push:
  release:
    types: [created]
jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: 1.25
      id: go

    - name: Check out code into the Go module directory
      uses: actions/checkout@v6

    - name: Build - Windows x86
      run: go build -ldflags="-s -w" -o dist/windows_x86/http-server.exe -v .
      env:
        GOOS: windows
        GOARCH: 386

    - name: Build - Windows x64
      run: go build -ldflags="-s -w" -o dist/windows_x64/http-server.exe -v .
      env:
        GOOS: windows
        GOARCH: amd64

    - name: Build - macOS x64 (Intel)
      run: go build -ldflags="-s -w" -o dist/macos_x64/http-server -v .
      env:
        GOOS: darwin
        GOARCH: amd64

    - name: Build - macOS ARM64 (Apple Silicon)
      run: go build -ldflags="-s -w" -o dist/macos_arm64/http-server -v .
      env:
        GOOS: darwin
        GOARCH: arm64

    - name: Archive production artifacts
      uses: actions/upload-artifact@v7
      with:
        name: dist
        path: dist

    - name: Upload Release Assets
      if: github.event_name == 'release'
      run: |
        gh release upload ${{ github.event.release.tag_name }} \
          dist/windows_x86/http-server.exe \
          dist/windows_x64/http-server.exe \
          dist/macos_x64/http-server \
          dist/macos_arm64/http-server
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
